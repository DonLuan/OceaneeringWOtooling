<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quadro de Ordens de Serviço WO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --navy:#16324F;
    --navy-2:#1E4770;
    --board:#FFFFFF;
    --frame:#AEB9C4;
    --frame-dark:#7C8A98;
    --red:#C0392B;
    --blue-marker:#1F4E8C;
    --line:#D8DCE1;
    --gray-bg:#F4F6F8;
    --ok:#2E7D4F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:#E7EAEE;
    color:#1C242C;
    padding:24px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:18px;
  }
  .title{
    font-family:'Kalam',cursive;
    font-size:28px;
    color:var(--navy);
    font-weight:700;
  }
  .status{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:#5A6672;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--ok);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.35;}
  }
  .actions button{
    font-family:'Inter',sans-serif;
    font-size:13px;
    padding:8px 14px;
    border-radius:6px;
    border:1px solid var(--frame-dark);
    background:#fff;
    color:var(--navy);
    cursor:pointer;
    margin-left:8px;
  }
  .actions button:hover{background:var(--gray-bg);}
  .actions button.primary{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .actions button.primary:hover{background:var(--navy-2);}

  .board-frame{
    background:linear-gradient(180deg,var(--frame),var(--frame-dark));
    border-radius:10px;
    padding:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.18);
  }
  .board{
    background:var(--board);
    border-radius:4px;
    display:grid;
    grid-template-columns:1fr;
    overflow-x:auto;
  }
  .grid{
    display:grid;
    grid-template-columns:130px repeat(5,minmax(120px,1fr)) 220px;
    min-width:900px;
  }
  .cell{
    border:1px solid var(--line);
    padding:10px 8px;
    font-size:14px;
    display:flex;
    align-items:center;
    min-height:44px;
    position:relative;
  }
  .head{
    background:var(--navy);
    color:#fff;
    font-weight:600;
    font-size:13px;
    letter-spacing:.02em;
    justify-content:center;
    text-align:center;
  }
  .tech-name{
    background:var(--gray-bg);
    font-weight:600;
    color:var(--navy);
    justify-content:space-between;
    gap:6px;
  }
  .tech-name input{
    border:none;
    background:transparent;
    font-weight:600;
    color:var(--navy);
    font-size:14px;
    width:100%;
    font-family:'Inter',sans-serif;
  }
  .tech-name input:focus{outline:none;border-bottom:1px solid var(--navy);}
  .del-row{
    background:none;border:none;color:#B0392B;cursor:pointer;
    font-size:15px;line-height:1;padding:2px;opacity:.55;
  }
  .del-row:hover{opacity:1;}

  .os-cell textarea{
    width:100%;
    border:none;
    background:transparent;
    resize:none;
    font-family:'Kalam',cursive;
    font-size:15px;
    color:var(--red);
    text-align:center;
    min-height:26px;
    line-height:1.3;
    font-weight:700;
    padding:2px;
  }
  .os-cell textarea:focus{
    outline:none;
    background:#FFF7E8;
    border-radius:4px;
  }
  .os-cell textarea.status-word{color:var(--blue-marker);}

  .obs-cell{
    grid-row:span 20;
    background:#fff;
    align-items:flex-start;
    flex-direction:column;
    padding:14px;
  }
  .obs-title{
    font-weight:600;
    color:var(--navy);
    font-size:13px;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .obs-cell textarea{
    width:100%;
    flex:1;
    border:none;
    resize:none;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--blue-marker);
    min-height:340px;
    line-height:1.6;
  }
  .obs-cell textarea:focus{outline:none;}

  .add-row-bar{
    display:flex;
    justify-content:center;
    padding:10px;
    background:var(--gray-bg);
  }
  .add-row-bar button{
    font-size:13px;
    border:1px dashed var(--frame-dark);
    background:transparent;
    color:var(--navy);
    padding:6px 16px;
    border-radius:6px;
    cursor:pointer;
  }
  .add-row-bar button:hover{background:#fff;}

  .footer-note{
    font-size:12px;
    color:#5A6672;
    margin-top:10px;
    text-align:right;
  }
  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
</style>
</head>
<body>
<h2 class="sr-only">Quadro digital de ordens de serviço por técnico e dia da semana, editável e sincronizado entre computadores.</h2>
<div class="wrap">

  <div class="topbar">
    <div class="title">Quadro de Ordens de Serviço</div>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Sincronizado</span>
    </div>
    <div class="actions">
      <button id="refreshBtn">Atualizar agora</button>
      <button id="resetBtn">Limpar quadro</button>
    </div>
  </div>

  <div class="board-frame">
    <div class="board">
      <div class="grid" id="grid"></div>
    </div>
    <div class="add-row-bar">
      <button id="addRowBtn">+ Adicionar técnico</button>
    </div>
  </div>

  <div class="footer-note" id="lastUpdated"></div>
</div>

<script>
const DAYS = ["2ª feira","3ª feira","4ª feira","5ª feira","6ª feira"];
const STORAGE_KEY = "quadro-os-board";

const DEFAULT_DATA = {
  tecnicos: [
    {name:"ADRIANO", dias:[]},
    {name:"DEYVID", dias:[]},
    {name:"GENECI", dias:[]},
    {name:"IAN", dias:[]},
    {name:"LEONEL", dias:[]},
    {name:"MAICON", dias:[]},
    {name:"MARCOS", dias:[]},
    {name:"V.MOTTA", dias:[]},
    {name:"V.PAIXÃO", dias:[]},
    {name:"V.PESSANHA", dias:[]},
    {name:"ELIEZER", dias:[]},
    {name:"ANTONIO", dias:[]},
    {name:"PEDRO", dias:[]},
    {name:"LEANDRO", dias:[]},
    {name:"MACIEL", dias:[]},
    {name:"M.ROSA", dias:[]},
    {name:"ROBERTO", dias:[]},
    {name:"BIANCA", dias:[]}
  ],
  observacoes: "ESTAGIÁRIOS:\nDANILO - Certificados\nJEAN - Prateleiras\nMARCOS - JSEA"
};

let data = null;
let saveTimer = null;
let pollTimer = null;

function isStatusWord(v){
  const w = v.trim().toLowerCase();
  return w === "atestado" || w === "férias" || w === "ferias";
}

function setStatus(text, ok){
  document.getElementById("statusText").textContent = text;
  document.getElementById("statusDot").style.background = ok ? "#2E7D4F" : "#C0392B";
}

function stampUpdated(){
  const now = new Date();
  document.getElementById("lastUpdated").textContent =
    "Última atualização: " + now.toLocaleString("pt-BR");
}

async function loadData(silent){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    data = res && res.value ? JSON.parse(res.value) : structuredClone(DEFAULT_DATA);
  }catch(e){
    data = structuredClone(DEFAULT_DATA);
  }
  render();
  if(!silent) setStatus("Sincronizado", true);
}

async function persist(){
  setStatus("Salvando...", true);
  try{
    const result = await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
    if(!result) throw new Error("falha ao salvar");
    setStatus("Sincronizado", true);
    stampUpdated();
  }catch(e){
    setStatus("Erro ao salvar", false);
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 600);
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const headEmpty = document.createElement("div");
  headEmpty.className = "cell head";
  headEmpty.textContent = "Técnicos";
  grid.appendChild(headEmpty);

  DAYS.forEach(d=>{
    const h = document.createElement("div");
    h.className = "cell head";
    h.textContent = d;
    grid.appendChild(h);
  });

  const obsHead = document.createElement("div");
  obsHead.className = "cell head";
  obsHead.textContent = "Observações";
  grid.appendChild(obsHead);

  data.tecnicos.forEach((tec, rowIdx)=>{
    const nameCell = document.createElement("div");
    nameCell.className = "cell tech-name";
    const nameInput = document.createElement("input");
    nameInput.value = tec.name;
    nameInput.addEventListener("input", e=>{
      data.tecnicos[rowIdx].name = e.target.value;
      scheduleSave();
    });
    const delBtn = document.createElement("button");
    delBtn.className = "del-row";
    delBtn.innerHTML = "&times;";
    delBtn.title = "Remover técnico";
    delBtn.addEventListener("click", ()=>{
      if(confirm("Remover " + (tec.name || "este técnico") + " do quadro?")){
        data.tecnicos.splice(rowIdx,1);
        render();
        scheduleSave();
      }
    });
    nameCell.appendChild(nameInput);
    nameCell.appendChild(delBtn);
    grid.appendChild(nameCell);

    DAYS.forEach((d, colIdx)=>{
      const cell = document.createElement("div");
      cell.className = "cell os-cell";
      const ta = document.createElement("textarea");
      ta.value = tec.dias[colIdx] || "";
      ta.rows = 1;
      if(isStatusWord(ta.value)) ta.classList.add("status-word");
      ta.addEventListener("input", e=>{
        data.tecnicos[rowIdx].dias[colIdx] = e.target.value;
        e.target.classList.toggle("status-word", isStatusWord(e.target.value));
        scheduleSave();
      });
      cell.appendChild(ta);
      grid.appendChild(cell);
    });

    if(rowIdx === 0){
      const obsCell = document.createElement("div");
      obsCell.className = "cell obs-cell";
      const obsTitle = document.createElement("div");
      obsTitle.className = "obs-title";
      obsTitle.textContent = "Observações";
      const obsTa = document.createElement("textarea");
      obsTa.value = data.observacoes || "";
      obsTa.addEventListener("input", e=>{
        data.observacoes = e.target.value;
        scheduleSave();
      });
      obsCell.appendChild(obsTitle);
      obsCell.appendChild(obsTa);
      grid.appendChild(obsCell);
    }
  });
}

document.getElementById("addRowBtn").addEventListener("click", ()=>{
  data.tecnicos.push({name:"NOVO TÉCNICO", dias:["","","","",""]});
  render();
  scheduleSave();
});

document.getElementById("refreshBtn").addEventListener("click", ()=>{
  loadData(false);
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Isso vai apagar todas as ordens de serviço do quadro (mantendo os nomes dos técnicos). Continuar?")){
    data.tecnicos.forEach(t=> t.dias = ["","","","",""]);
    render();
    scheduleSave();
  }
});

loadData(false);
pollTimer = setInterval(()=>{ loadData(true); }, 8000);
</script>
</body>
</html>
